name: Train Model

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'configs/**'
      - 'requirements.txt'

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('punkt'); nltk.download('averaged_perceptron_tagger')"
    
    - name: Create necessary directories
      run: |
        mkdir -p data/raw data/processed models/trained logs mlruns
    
    - name: Train model
      run: |
        python scripts/train_model.py
    
    - name: Check model performance
      run: |
        python -c "
        import pickle
        import yaml
        
        # Load config
        with open('configs/config.yaml', 'r') as f:
            config = yaml.safe_load(f)
        
        # Check if model exists
        import os
        model_path = 'models/trained/sentiment_model.pkl'
        if not os.path.exists(model_path):
            print('❌ Model file not found!')
            exit(1)
        
        print('✅ Model training completed successfully!')
        print('✅ Model file created')
        "
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: |
          models/trained/
          mlruns/
        retention-days: 30
    
    - name: Upload training logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: training-logs
        path: logs/
        retention-days: 7
