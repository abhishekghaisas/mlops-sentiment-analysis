name: Build Docker Images

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'src/**'
      - 'requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build API image
      run: |
        docker build -f docker/Dockerfile.api -t sentiment-api:latest . || echo "⚠️ API Dockerfile not ready yet - skipping"
    
    - name: Build Training image
      run: |
        docker build -f docker/Dockerfile.training -t sentiment-training:latest . || echo "⚠️ Training Dockerfile not ready yet - skipping"
    
    - name: Test images (if built)
      run: |
        if docker images | grep -q sentiment-api; then
          echo "✅ API image built successfully"
        fi
        if docker images | grep -q sentiment-training; then
          echo "✅ Training image built successfully"
        fi
