version: '3.8'

services:
  # Sentiment Analysis API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MLflow Tracking Server - Using gunicorn directly
  mlflow:
    image: python:3.9-slim
    container_name: mlflow-server
    ports:
      - "5001:5000"
    volumes:
      - ../mlruns:/mlflow/mlruns
      - ../mlartifacts:/mlflow/mlartifacts
    command: >
      sh -c "pip install mlflow==2.9.2 gunicorn &&
             gunicorn -w 4 -b 0.0.0.0:5000 mlflow.server:app 
             --timeout 120
             --keep-alive 5"
    environment:
      - MLFLOW_BACKEND_STORE_URI=file:///mlflow/mlruns
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=file:///mlflow/mlartifacts
    restart: unless-stopped
    networks:
      - mlops-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - mlops-network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
